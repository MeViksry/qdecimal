name: qdecimal

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qdecimal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go ${{ matrix.go-version }}
    runs-on: self-hosted
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        go-version: ['1.23.x', '1.24.x', '1.25.x', '1.26.x']
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Configure Go workspace
        shell: bash
        run: |
          find /tmp -maxdepth 1 -type d \( -name 'go-build*' -o -name 'qdecimal-*' \) -exec rm -rf {} +
          rm -rf "${RUNNER_TEMP}/qdecimal-go-cache" "${RUNNER_TEMP}/qdecimal-go-path" "${RUNNER_TEMP}/qdecimal-go-tmp"
          mkdir -p "${RUNNER_TEMP}/qdecimal-go-cache" "${RUNNER_TEMP}/qdecimal-go-path" "${RUNNER_TEMP}/qdecimal-go-tmp"
          {
            echo "GOCACHE=${RUNNER_TEMP}/qdecimal-go-cache"
            echo "GOPATH=${RUNNER_TEMP}/qdecimal-go-path"
            echo "GOTMPDIR=${RUNNER_TEMP}/qdecimal-go-tmp"
          } >> "${GITHUB_ENV}"
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go-version }}
          cache: false
      - name: Test qdecimal
        run: go test ./...

  quality:
    name: Quality
    needs: test
    runs-on: self-hosted
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Configure Go workspace
        shell: bash
        run: |
          find /tmp -maxdepth 1 -type d \( -name 'go-build*' -o -name 'qdecimal-*' \) -exec rm -rf {} +
          rm -rf "${RUNNER_TEMP}/qdecimal-go-cache" "${RUNNER_TEMP}/qdecimal-go-path" "${RUNNER_TEMP}/qdecimal-go-tmp"
          mkdir -p "${RUNNER_TEMP}/qdecimal-go-cache" "${RUNNER_TEMP}/qdecimal-go-path" "${RUNNER_TEMP}/qdecimal-go-tmp"
          {
            echo "GOCACHE=${RUNNER_TEMP}/qdecimal-go-cache"
            echo "GOPATH=${RUNNER_TEMP}/qdecimal-go-path"
            echo "GOTMPDIR=${RUNNER_TEMP}/qdecimal-go-tmp"
          } >> "${GITHUB_ENV}"
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          cache: false
      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: Verify dependency policy
        run: go run ./internal/qdecimalci deps
      - name: Run race detector
        run: go run ./internal/qdecimalci race
      - name: Run coverage
        run: go run ./internal/qdecimalci coverage
      - name: Run stress suite
        run: QDECIMAL_STRESS=1 go run ./internal/qdecimalci stress
      - name: Run fuzz smoke suite
        run: go run ./internal/qdecimalci fuzz-smoke
      - name: Run benchmark smoke suite
        run: go run ./internal/qdecimalci bench-smoke
      - name: Run go vet
        run: go vet ./...
      - name: Run consumer smoke suite
        run: go run ./internal/qdecimalci consumer-smoke
      - name: Run cross-platform compile gate
        run: go run ./internal/qdecimalci cross-build
      - name: Run vulnerability scan
        run: go run ./internal/qdecimalci vuln
      - name: Build
        run: go build ./...
