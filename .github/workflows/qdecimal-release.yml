name: qdecimal Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

env:
  HOME: /root
  GOCACHE: /tmp/qdecimal-release-go-cache
  GOPATH: /tmp/qdecimal-release-go-path
  GO_VERSION: '1.26.x'

concurrency:
  group: qdecimal-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify qdecimal release candidate
    runs-on: self-hosted
    timeout-minutes: 75
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Validate qdecimal release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "qdecimal release tags must use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease"
            exit 1
          fi

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Run unit tests
        run: go test ./...

      - name: Verify dependency policy
        run: make deps

      - name: Run race detector
        run: go test -race ./...

      - name: Run coverage
        run: make coverage

      - name: Run stress suite
        run: QDECIMAL_STRESS=1 go test -run '^TestStress' ./...

      - name: Run fuzz smoke suite
        run: make fuzz-smoke

      - name: Run benchmark smoke suite
        run: make bench-smoke

      - name: Run go vet
        run: go vet ./...

      - name: Run consumer smoke suite
        run: make consumer-smoke

      - name: Run vulnerability scan
        run: make vuln

      - name: Build package
        run: go build ./...

  publish:
    name: Publish qdecimal release
    needs: verify
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Prepare qdecimal release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            version="${GITHUB_REF_NAME}"
            release_title="qdecimal ${version}"
            archive_version="${version}"
            prerelease="false"
            if [[ "${version}" == *-* ]]; then
              prerelease="true"
            fi
          else
            release_tag="nightly"
            release_title="qdecimal nightly"
            archive_version="nightly-${short_sha}"
            version="nightly-${short_sha}"
            prerelease="true"
            make_latest="false"
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${prerelease}" == "false" ]]; then
            make_latest="true"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            make_latest="false"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_title=${release_title}"
            echo "archive_version=${archive_version}"
            echo "version=${version}"
            echo "prerelease=${prerelease}"
            echo "make_latest=${make_latest}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Update qdecimal nightly tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "${GITHUB_SHA}"
          git push origin refs/tags/nightly --force

      - name: Build source archive and checksum
        id: package
        shell: bash
        run: |
          set -euo pipefail

          dist_dir="${RUNNER_TEMP}/qdecimal-release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          dist_dir="$(sh scripts/release-archive.sh "${{ steps.meta.outputs.archive_version }}" "${dist_dir}")"
          echo "dist_dir=${dist_dir}" >> "${GITHUB_OUTPUT}"

      - name: Publish qdecimal nightly release
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          go run -tags releasehelper ./internal/releasegithub \
            -tag "${{ steps.meta.outputs.release_tag }}" \
            -name "${{ steps.meta.outputs.release_title }}" \
            -body "Automated qdecimal nightly source archive from ${{ github.sha }}." \
            -prerelease=true \
            -make-latest=false \
            "${{ steps.package.outputs.dist_dir }}"/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish qdecimal tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          go run -tags releasehelper ./internal/releasegithub \
            -tag "${{ steps.meta.outputs.release_tag }}" \
            -name "${{ steps.meta.outputs.release_title }}" \
            -generate-notes=true \
            -prerelease=${{ steps.meta.outputs.prerelease }} \
            -make-latest=${{ steps.meta.outputs.make_latest }} \
            "${{ steps.package.outputs.dist_dir }}"/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prime Go module proxy and pkg.go.dev
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GOPROXY: https://proxy.golang.org,direct
          GOSUMDB: sum.golang.org
        run: go list -m github.com/MeViksry/qdecimal@${{ steps.meta.outputs.version }}

      - name: Cleanup release staging
        if: always() && steps.package.outputs.dist_dir != ''
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="${{ steps.package.outputs.dist_dir }}"
          case "${dist_dir}" in
            "${RUNNER_TEMP}"/qdecimal-release-*) rm -rf "${dist_dir}" ;;
            *) echo "Refusing unsafe cleanup path: ${dist_dir}" >&2; exit 1 ;;
          esac
