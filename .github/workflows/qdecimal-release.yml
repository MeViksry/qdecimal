name: qdecimal Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: '1.26.x'
  GHCR_IMAGE: qdecimal

concurrency:
  group: qdecimal-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify qdecimal release candidate
    runs-on: self-hosted
    timeout-minutes: 75
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Configure Go workspace
        shell: bash
        run: |
          find /tmp -maxdepth 1 -type d \( -name 'go-build*' -o -name 'qdecimal-*' \) -exec rm -rf {} +
          rm -rf "${RUNNER_TEMP}/qdecimal-release-go-cache" "${RUNNER_TEMP}/qdecimal-release-go-path" "${RUNNER_TEMP}/qdecimal-release-go-tmp"
          mkdir -p "${RUNNER_TEMP}/qdecimal-release-go-cache" "${RUNNER_TEMP}/qdecimal-release-go-path" "${RUNNER_TEMP}/qdecimal-release-go-tmp"
          {
            echo "GOCACHE=${RUNNER_TEMP}/qdecimal-release-go-cache"
            echo "GOPATH=${RUNNER_TEMP}/qdecimal-release-go-path"
            echo "GOTMPDIR=${RUNNER_TEMP}/qdecimal-release-go-tmp"
          } >> "${GITHUB_ENV}"
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Validate qdecimal release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "qdecimal release tags must use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease"
            exit 1
          fi

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Run unit tests
        run: go test ./...

      - name: Verify dependency policy
        run: go run ./internal/qdecimalci deps

      - name: Run race detector
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: go run ./internal/qdecimalci race

      - name: Run coverage
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: go run ./internal/qdecimalci coverage

      - name: Run stress suite
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: QDECIMAL_STRESS=1 go run ./internal/qdecimalci stress

      - name: Run fuzz smoke suite
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: go run ./internal/qdecimalci fuzz-smoke

      - name: Run benchmark smoke suite
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: go run ./internal/qdecimalci bench-smoke

      - name: Run go vet
        run: go vet ./...

      - name: Run consumer smoke suite
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: go run ./internal/qdecimalci consumer-smoke

      - name: Run cross-platform compile gate
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: go run ./internal/qdecimalci cross-build

      - name: Run vulnerability scan
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: go run ./internal/qdecimalci vuln

      - name: Build package
        run: go build ./...

  publish:
    name: Publish qdecimal release
    needs: verify
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure Go workspace
        shell: bash
        run: |
          find /tmp -maxdepth 1 -type d \( -name 'go-build*' -o -name 'qdecimal-*' \) -exec rm -rf {} +
          rm -rf "${RUNNER_TEMP}/qdecimal-release-go-cache" "${RUNNER_TEMP}/qdecimal-release-go-path" "${RUNNER_TEMP}/qdecimal-release-go-tmp"
          mkdir -p "${RUNNER_TEMP}/qdecimal-release-go-cache" "${RUNNER_TEMP}/qdecimal-release-go-path" "${RUNNER_TEMP}/qdecimal-release-go-tmp"
          {
            echo "GOCACHE=${RUNNER_TEMP}/qdecimal-release-go-cache"
            echo "GOPATH=${RUNNER_TEMP}/qdecimal-release-go-path"
            echo "GOTMPDIR=${RUNNER_TEMP}/qdecimal-release-go-tmp"
          } >> "${GITHUB_ENV}"
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - uses: oras-project/setup-oras@v1

      - name: Prepare qdecimal release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            version="${GITHUB_REF_NAME}"
            release_title="qdecimal ${version}"
            archive_version="${version}"
            prerelease="false"
            if [[ "${version}" == *-* ]]; then
              prerelease="true"
            fi
          else
            release_tag="nightly"
            release_title="qdecimal nightly"
            archive_version="nightly-${short_sha}"
            version="nightly-${short_sha}"
            prerelease="true"
            make_latest="false"
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${prerelease}" == "false" ]]; then
            make_latest="true"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            make_latest="false"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_title=${release_title}"
            echo "archive_version=${archive_version}"
            echo "version=${version}"
            echo "prerelease=${prerelease}"
            echo "make_latest=${make_latest}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Update qdecimal nightly tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "${GITHUB_SHA}"
          git push origin refs/tags/nightly --force

      - name: Build source archive and checksum
        id: package
        shell: bash
        run: |
          set -euo pipefail

          dist_dir="${RUNNER_TEMP}/qdecimal-release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          dist_dir="$(sh scripts/release-archive.sh "${{ steps.meta.outputs.archive_version }}" "${dist_dir}")"
          echo "dist_dir=${dist_dir}" >> "${GITHUB_OUTPUT}"

      - name: Publish qdecimal GitHub Package
        shell: bash
        run: |
          set -euo pipefail

          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/${GHCR_IMAGE}"
          version="${{ steps.meta.outputs.version }}"
          dist_dir="${{ steps.package.outputs.dist_dir }}"
          archive="qdecimal-${{ steps.meta.outputs.archive_version }}.tar.gz"
          checksums="checksums.txt"

          export HOME="${RUNNER_TEMP}/qdecimal-oras-home"
          mkdir -p "${HOME}"
          cd "${dist_dir}"

          printf '%s' "${GITHUB_TOKEN}" | oras login ghcr.io \
            --username "${GITHUB_ACTOR}" \
            --password-stdin

          oras push "${image}:${version}" \
            --artifact-type "application/vnd.meviksry.qdecimal.source.v1+tar" \
            --annotation "org.opencontainers.image.title=qdecimal" \
            --annotation "org.opencontainers.image.description=Exact base-10 decimal arithmetic for finance, banking, exchanges, ledgers, and trading systems." \
            --annotation "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --annotation "org.opencontainers.image.url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --annotation "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --annotation "org.opencontainers.image.version=${version}" \
            --annotation "org.opencontainers.image.licenses=MIT" \
            "${archive}:application/gzip" \
            "${checksums}:text/plain"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${{ steps.meta.outputs.prerelease }}" == "false" ]]; then
            oras tag "${image}:${version}" latest
          elif [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            oras tag "${image}:${version}" nightly
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish qdecimal nightly release
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          go run -tags releasehelper ./internal/releasegithub \
            -tag "${{ steps.meta.outputs.release_tag }}" \
            -name "${{ steps.meta.outputs.release_title }}" \
            -body "Automated qdecimal nightly source archive from ${{ github.sha }}." \
            -prerelease=true \
            -make-latest=false \
            "${{ steps.package.outputs.dist_dir }}"/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish qdecimal tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          go run -tags releasehelper ./internal/releasegithub \
            -tag "${{ steps.meta.outputs.release_tag }}" \
            -name "${{ steps.meta.outputs.release_title }}" \
            -generate-notes=true \
            -prerelease=${{ steps.meta.outputs.prerelease }} \
            -make-latest=${{ steps.meta.outputs.make_latest }} \
            "${{ steps.package.outputs.dist_dir }}"/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prime Go module proxy and pkg.go.dev
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GOPROXY: https://proxy.golang.org,direct
          GOSUMDB: sum.golang.org
        run: go list -m github.com/MeViksry/qdecimal@${{ steps.meta.outputs.version }}

      - name: Cleanup release staging
        if: always() && steps.package.outputs.dist_dir != ''
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="${{ steps.package.outputs.dist_dir }}"
          case "${dist_dir}" in
            "${RUNNER_TEMP}"/qdecimal-release-*) rm -rf "${dist_dir}" ;;
            *) echo "Refusing unsafe cleanup path: ${dist_dir}" >&2; exit 1 ;;
          esac
